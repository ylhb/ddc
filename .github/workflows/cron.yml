name: Device Data Crawler (Node.js)

on:
  # schedule:
    # 国际标准时间 (UTC)。每半小时执行一次
    # - cron: '0,30 * * * *'
  repository_dispatch:
    types: [fetch-data-event]
  workflow_dispatch: # 支持在网页上手动点击触发测试

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 使用稳定的 Node.js 20 版本

    - name: Install dependencies
      # 直接安装 axios，省去配置 package.json 的麻烦
      run: npm install axios

    - name: Run script
      run: node fetch_data.js

    - name: Commit and Push Data
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data/
        # 只有当数据发生变化时才提交，防止报错
        git diff-index --quiet HEAD || git commit -m "Auto-update device data $(date '+%Y-%m-%d %H:%M:%S')"
        git push